name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version comes from the "packageManager" field in package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # `next lint` was removed in Next 16 and no ESLint config is set up yet,
      # so keep this non-blocking until linting is configured.
      - name: Lint
        run: pnpm run lint
        continue-on-error: true

      # next.config.mjs sets ignoreBuildErrors, so surface type errors here
      # without failing the build.
      - name: Typecheck
        run: pnpm exec tsc --noEmit
        continue-on-error: true

      - name: Build
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

  docker:
    name: Build & push image (GHCR)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Loads the PROD environment so the NEXT_PUBLIC_API_URL variable is baked
    # into the production client bundle.
    environment: PROD
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires a lowercase image path; the repo owner may contain caps.
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS (Dokploy)
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Loads the PROD environment's secrets (DOKPLOY_DEPLOY_WEBHOOK, PROD_HEALTH_URL).
    environment: PROD

    steps:
      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_DEPLOY_WEBHOOK: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}
        run: |
          curl -fSs --retry 3 --retry-delay 5 -X POST "$DOKPLOY_DEPLOY_WEBHOOK"

      # Verify the new release is live.
      # Skips automatically until PROD_HEALTH_URL is set.
      - name: Verify live
        env:
          PROD_HEALTH_URL: ${{ secrets.PROD_HEALTH_URL }}
        run: |
          if [ -z "$PROD_HEALTH_URL" ]; then
            echo "PROD_HEALTH_URL unset; skipping health poll"; exit 0
          fi
          echo "Polling $PROD_HEALTH_URL"
          for i in $(seq 1 30); do
            if curl -fsS "$PROD_HEALTH_URL"; then
              echo "✅ healthy"; exit 0
            fi
            echo "attempt $i not ready; retrying in 10s"; sleep 10
          done
          echo "❌ deploy did not become healthy in time"; exit 1
