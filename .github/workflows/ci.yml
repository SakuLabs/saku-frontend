name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version comes from the "packageManager" field in package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # `next lint` was removed in Next 16 and no ESLint config is set up yet,
      # so keep this non-blocking until linting is configured.
      - name: Lint
        run: pnpm run lint
        continue-on-error: true

      # next.config.mjs sets ignoreBuildErrors, so surface type errors here
      # without failing the build.
      - name: Typecheck
        run: pnpm exec tsc --noEmit
        continue-on-error: true

      - name: Build
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
